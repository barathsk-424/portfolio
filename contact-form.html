<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Modern Form</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- EmailJS CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --ring: rgba(99, 102, 241, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
        }

        .contact-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--ring);
            background: #fff;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        /* Success/Error Toasts (Simple Alerts replacement) */
        .status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        @media (max-width: 480px) {
            .contact-container {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="header">
            <h1>Get In Touch</h1>
            <p>We'd love to hear from you. Please fill out the form below.</p>
        </div>

        <form id="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" class="form-control" placeholder="How can we help you?" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">
                <span>Send Message</span>
            </button>
            
            <div id="status-msg" class="status-msg"></div>
        </form>
    </div>

    <script type="text/javascript">
        // 1. Initialize EmailJS with your Public Key
        // REPLACE 'YOUR_PUBLIC_KEY_HERE' with your real Public Key from EmailJS Dashboard
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY_HERE"); 
        })();

        window.onload = function() {
            const contactForm = document.getElementById('contact-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = submitBtn.querySelector('span');
            const statusMsg = document.getElementById('status-msg');

            contactForm.addEventListener('submit', function(event) {
                event.preventDefault();

                // UX: Disable button and show sending state
                submitBtn.disabled = true;
                btnText.innerText = 'Sending...';
                statusMsg.className = 'status-msg'; // Reset status classes
                statusMsg.innerText = '';

                // 2. Send the form data
                // REPLACE 'YOUR_SERVICE_ID' and 'YOUR_TEMPLATE_ID' with yours
                emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                    .then(function() {
                        // SUCCESS
                        showStatus('Message sent successfully!', 'success');
                        contactForm.reset();
                    }, function(error) {
                        // ERROR
                        console.error('FAILED...', error);
                        showStatus('Failed to send message. Please try again.', 'error');
                    })
                    .finally(() => {
                        // UX: Re-enable button
                        submitBtn.disabled = false;
                        btnText.innerText = 'Send Message';
                    });
            });

            function showStatus(message, type) {
                statusMsg.innerText = message;
                statusMsg.className = `status-msg status-${type}`;
                
                // Hide message after 5 seconds
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                }, 5000);
            }
        };
    </script>
</body>
</html>
